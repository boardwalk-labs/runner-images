name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # Run JS actions on Node 24 now (GitHub forces this 2026-06-16); a no-op once it is the default.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  guest-scripts:
    # Static checks for the Firecracker guest recipes (guest/). The full kernel build + smoke
    # boot need hours + KVM and publish separately (guest/README.md "Publishing"); this keeps
    # the scripts themselves from rotting in the meantime.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: shellcheck + syntax
        run: |
          shellcheck guest/kernel/build_kernel.sh guest/rootfs/oci_to_ext4.sh guest/smoke_boot.sh
          bash -n guest/kernel/build_kernel.sh guest/rootfs/oci_to_ext4.sh guest/smoke_boot.sh

  linux-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build boardwalk/linux
        run: docker build -t boardwalk-runner-linux:ci images/linux
      - name: Smoke-test the environment contract (offline — pins must not lazy-download)
        run: |
          docker run --rm --network none boardwalk-runner-linux:ci bash -c '
            set -euo pipefail
            node --version && pnpm --version && tsx --version
            git --version && gh --version && python3 --version && jq --version
            [ "$(whoami)" = "node" ]
            [ "$PWD" = "/workspace" ] && touch /workspace/writable
          '
      - name: Environment lock — fail on drift (the env change IS the PR diff)
        run: |
          scripts/env-manifest.sh boardwalk-runner-linux:ci > /tmp/ENVIRONMENT.lock
          if ! diff -u images/linux/ENVIRONMENT.lock /tmp/ENVIRONMENT.lock > /tmp/env.diff; then
            {
              echo "### Runner environment changed"
              echo "The built image no longer matches \`images/linux/ENVIRONMENT.lock\`."
              echo "Regenerate and commit it so the change is reviewed in this PR:"
              echo '```'
              echo "scripts/env-manifest.sh <built-image> > images/linux/ENVIRONMENT.lock"
              echo '```'
              echo '```diff'
              cat /tmp/env.diff
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Environment lock out of date — regenerate images/linux/ENVIRONMENT.lock (see job summary)"
            exit 1
          fi
          echo "Environment lock matches the built image." >> "$GITHUB_STEP_SUMMARY"
      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: boardwalk-runner-linux:ci
          format: spdx-json
          output-file: sbom.spdx.json
          artifact-name: sbom-linux.spdx.json
      - name: Vulnerability scan (gate on fixable criticals)
        uses: anchore/scan-action@v6
        with:
          image: boardwalk-runner-linux:ci
          severity-cutoff: critical
          fail-build: true
          # Gate on critical CVEs that actually HAVE a fix. `only-fixed` excludes the Debian base's
          # unpatchable "won't fix" CVEs (documented in SECURITY_TRIAGE.md) that can't be resolved
          # here and would otherwise block every build. A new FIXABLE critical fails the gate — bump
          # the base/packages to clear it. Highs are reported (next step) + triaged, not hard-gated:
          # the npm toolchain's vendored deps carry a steady stream of fixable highs that lag
          # upstream and aren't reachable in the runner threat model. See POLICY.md / SECURITY_TRIAGE.md.
          only-fixed: true
          output-format: table
      - name: Vulnerability report — high severity (informational, triaged)
        uses: anchore/scan-action@v6
        with:
          image: boardwalk-runner-linux:ci
          severity-cutoff: high
          only-fixed: true
          fail-build: false # reported for triage, never blocks — see SECURITY_TRIAGE.md
          output-format: table

  linux-desktop-image:
    # boardwalk/linux-desktop = the base + an on-screen desktop + the browser tier (Chromium +
    # Playwright MCP). Its own build/smoke/lock/scan, same shape as linux-image; it derives FROM the
    # published base by digest, so this builds the added layer on top of the pinned parent.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build boardwalk/linux-desktop
        run: docker build -t boardwalk-runner-linux-desktop:ci images/linux-desktop
      - name: Smoke-test the browser tier (offline — the desktop, Chromium CDP, and Playwright MCP)
        run: |
          docker run --rm --network none -i boardwalk-runner-linux-desktop:ci bash \
            < images/linux-desktop/smoke.sh
      - name: Environment lock — fail on drift (the env change IS the PR diff)
        run: |
          scripts/env-manifest.sh boardwalk-runner-linux-desktop:ci > /tmp/ENVIRONMENT.lock
          if ! diff -u images/linux-desktop/ENVIRONMENT.lock /tmp/ENVIRONMENT.lock > /tmp/env.diff; then
            {
              echo "### Runner environment changed (linux-desktop)"
              echo "The built image no longer matches \`images/linux-desktop/ENVIRONMENT.lock\`."
              echo "Regenerate and commit it so the change is reviewed in this PR:"
              echo '```'
              echo "scripts/env-manifest.sh <built-image> > images/linux-desktop/ENVIRONMENT.lock"
              echo '```'
              echo '```diff'
              cat /tmp/env.diff
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Environment lock out of date — regenerate images/linux-desktop/ENVIRONMENT.lock (see job summary)"
            exit 1
          fi
          echo "Environment lock matches the built image." >> "$GITHUB_STEP_SUMMARY"
      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: boardwalk-runner-linux-desktop:ci
          format: spdx-json
          output-file: sbom.spdx.json
          artifact-name: sbom-linux-desktop.spdx.json
      - name: Vulnerability scan (gate on fixable criticals)
        uses: anchore/scan-action@v6
        with:
          image: boardwalk-runner-linux-desktop:ci
          severity-cutoff: critical
          fail-build: true
          # Same gate as the base (POLICY.md): a new FIXABLE critical blocks; the Debian base's
          # unpatchable "won't fix" CVEs are excluded by only-fixed. Chromium's fixable criticals,
          # if any, block the build — clear by bumping the base digest or the pinned packages.
          only-fixed: true
          output-format: table
      - name: Vulnerability report — high severity (informational, triaged)
        uses: anchore/scan-action@v6
        with:
          image: boardwalk-runner-linux-desktop:ci
          severity-cutoff: high
          only-fixed: true
          fail-build: false # reported for triage, never blocks — see SECURITY_TRIAGE.md
          output-format: table
