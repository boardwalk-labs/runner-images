# Publish boardwalk/linux to GHCR on a version tag (v1.4.0 → :1.4.0), by digest, with the SBOM
# and scan report attached to the GitHub release. See POLICY.md for what a release must contain.

name: Release

on:
  push:
    tags: ["v*"]

jobs:
  publish-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write # attach SBOM + scan report to the release
      packages: write # push to GHCR
      id-token: write # build provenance
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve the image ref (the image tag is the semver WITHOUT the git tag's leading v)
        id: meta
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER}/boardwalk-runner-linux:${version}" >> "$GITHUB_OUTPUT"
      - name: Build and push (with provenance)
        id: push
        uses: docker/build-push-action@v6
        with:
          context: images/linux
          push: true
          tags: ${{ steps.meta.outputs.image }}
          provenance: true
      - name: Generate SBOM of the pushed image
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.meta.outputs.image }}
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Vulnerability scan report
        uses: anchore/scan-action@v6
        id: scan
        with:
          image: ${{ steps.meta.outputs.image }}
          severity-cutoff: critical
          fail-build: true
          output-format: sarif
      - name: Create the GitHub release with digest + SBOM + scan
        env:
          GH_TOKEN: ${{ github.token }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          {
            echo "Tag: \`${{ steps.meta.outputs.image }}\`"
            echo "Pin by digest: \`${{ steps.meta.outputs.image }}@${DIGEST}\`"
            echo ""
            echo "Pin by digest in anything that matters; \`latest\` is never published."
          } > notes.md
          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file notes.md \
            sbom.spdx.json "${{ steps.scan.outputs.sarif }}"
